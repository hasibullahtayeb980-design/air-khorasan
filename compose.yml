services:
  nginx:
    image: nginx:1.19-alpine
    container_name: ak-nginx
    ports:
      - "8000:80"
    volumes:
      - ./api/nginx:/etc/nginx/conf.d
      - ./api:/var/www
    depends_on:
      - api
      - database
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: ak-api
    ports:
      - "9000:9000"
    volumes:
      - ./api:/var/www
    depends_on:
      - database
  database:
    image: mysql:8.0
    container_name: ak-mysql
    ports:
      - "3306:3306"
    volumes:
      - mysql-db:/var/lib/mysql
    environment:
      MYSQL_DATABASE: air-khorasan
      MYSQL_USER: khorasan
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: rootsecret

volumes:
  mysql-db: